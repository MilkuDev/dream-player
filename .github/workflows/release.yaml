name: Build & Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # --- BUILD WINDOWS ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows Packages & Distributable
        run: ./gradlew :desktopApp:packageExe :desktopApp:packageMsi :desktopApp:createDistributable

      - name: Pack Windows Portable ZIP
        shell: powershell
        run: |
          Compress-Archive -Path desktopApp\build\compose\binaries\main\app\* -DestinationPath desktopApp\build\compose\binaries\main\DreamPlayer-Windows-Portable.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            desktopApp/build/compose/binaries/main/exe/*.exe
            desktopApp/build/compose/binaries/main/msi/*.msi
            desktopApp/build/compose/binaries/main/DreamPlayer-Windows-Portable.zip

  # --- BUILD MACOS ---
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build macOS Packages & Distributable
        run: ./gradlew :desktopApp:packageDmg :desktopApp:packagePkg :desktopApp:createDistributable

      - name: Pack macOS Portable ZIP
        run: |
          cd desktopApp/build/compose/binaries/main
          zip -r DreamPlayer-macOS-Portable.zip app/

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            desktopApp/build/compose/binaries/main/dmg/*.dmg
            desktopApp/build/compose/binaries/main/pkg/*.pkg
            desktopApp/build/compose/binaries/main/DreamPlayer-macOS-Portable.zip

  # --- BUILD LINUX & ANDROID ---
  build-linux-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Android Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build Linux Packages & Android APK
        run: ./gradlew :androidApp:assembleRelease :desktopApp:packageDeb :desktopApp:packageRpm :desktopApp:createDistributable
        env:
          KEYSTORE_PATH: "release.keystore"
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Pack Linux Portable Tarball
        run: |
          cd desktopApp/build/compose/binaries/main
          tar -czvf DreamPlayer-Linux-Portable.tar.gz app/

      - name: Upload Linux & Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-android-artifacts
          path: |
            androidApp/build/outputs/apk/release/*.apk
            desktopApp/build/compose/binaries/main/deb/*.deb
            desktopApp/build/compose/binaries/main/rpm/*.rpm
            desktopApp/build/compose/binaries/main/DreamPlayer-Linux-Portable.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux-android]
    steps:
      - name: Create Clean Directory
        run: mkdir ./ready-artifacts

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./ready-artifacts
          merge-multiple: true

      - name: Generate SHA-256 Checksums
        run: |
          cd ./ready-artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./ready-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}